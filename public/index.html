<!-- FRONTEND MVP - SNAP QR FIELDING SYSTEM -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snap QR Fielding</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100">

<!-- HEADER -->
<header class="bg-black text-white p-4">
<div class="max-w-6xl mx-auto flex justify-between">
<h1 class="text-xl font-bold">Snap QR Fielding</h1>
<button class="bg-yellow-500 px-4 py-2 rounded">
Login
</button>
</div>
</header>

<!-- HERO -->
<section class="max-w-6xl mx-auto py-10 px-4">

<div class="bg-white rounded-xl shadow p-8">

<h2 class="text-3xl font-bold mb-4">
Create Snapchat QR Session
</h2>

<p class="text-gray-600 mb-6">
Generate QR code and earn from your Snapchat traffic.
</p>

<a href="#create-session" class="bg-green-600 text-white px-6 py-3 rounded-lg inline-block">
Create Session
</a>

</div>

</section>

<!-- DASHBOARD -->
<section class="max-w-6xl mx-auto px-4">

<div class="grid md:grid-cols-4 gap-4">

<div class="bg-white p-6 rounded-xl shadow">
<h3 class="text-gray-500">Total Sessions</h3>
<p class="text-3xl font-bold" id="total-sessions">0</p>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<h3 class="text-gray-500">Payments</h3>
<p class="text-3xl font-bold" id="total-payments">0</p>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<h3 class="text-gray-500">Revenue</h3>
<p class="text-3xl font-bold" id="total-revenue">Rs.0</p>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<h3 class="text-gray-500">Active QR</h3>
<p class="text-3xl font-bold" id="active-qr">0</p>
</div>

</div>

</section>

<!-- CREATE SESSION -->
<section class="max-w-6xl mx-auto p-4 mt-6" id="create-session">

<div class="bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-bold mb-5">
Create New Session
</h2>

<form class="space-y-4" method="POST" action="/create-session">

<input
type="text"
name="jazzcash"
placeholder="JazzCash Number"
class="w-full border p-3 rounded"
/>

<input
type="text"
name="easypaisa"
placeholder="EasyPaisa Number"
class="w-full border p-3 rounded"
/>

<input
type="number"
name="amount"
placeholder="Amount"
value="1000"
class="w-full border p-3 rounded"
/>

<button
type="submit"
class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700"
>
Generate QR
</button>

</form>

</div>

</section>

<!-- QR SECTION -->
<section class="max-w-6xl mx-auto p-4 mt-6" id="qr-section" style="display:none;">

<div class="bg-white rounded-xl shadow p-6 text-center">

<h2 class="text-xl font-bold mb-4">
Generated QR
</h2>

<img
id="qr-image"
class="mx-auto"
/>

<p class="mt-4 text-gray-500">
Expires in 30 Minutes
</p>

<p class="mt-2 text-sm text-gray-400" id="qr-url"></p>

</div>

</section>

<!-- FOOTER -->
<footer class="bg-black text-white text-center p-4 mt-10">
Snap QR Fielding System © 2026
</footer>

<script>
// Update dashboard on page load
async function updateDashboard() {
  try {
    const response = await fetch('/api/stats');
    const data = await response.json();
    
    document.getElementById('total-sessions').textContent = data.totalSessions;
    document.getElementById('total-payments').textContent = data.totalPayments;
    document.getElementById('total-revenue').textContent = 'Rs.' + data.totalRevenue;
    document.getElementById('active-qr').textContent = data.activeQR;
  } catch (error) {
    console.error('Error fetching stats:', error);
  }
}

updateDashboard();
setInterval(updateDashboard, 5000); // Update every 5 seconds
</script>

</body>
</html>
